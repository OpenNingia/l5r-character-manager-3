name: Android (QML, experimental)

# Builds a debug APK of the QML-only UI via pyside6-android-deploy
# (python-for-android under the hood). This is an EXPERIMENTAL spike target
# kept separate from release.yml so it can never destabilise the desktop
# release pipeline. python-for-android only runs on Linux, which is why this
# job exists at all (the desktop CI is Windows-first).
#
# Entry point: android_main.py (QML-only, PySide6, no legacy QWidget UI).
# Config:      tools/deploy/android/pysidedeploy.spec
#
# Two things are expected to need iteration here (the make-or-break of the
# spike), and are intentionally surfaced rather than hidden:
#   1. The Android Qt wheels for PySide6/shiboken must MATCH the desktop
#      PySide6 version installed below, and must be aarch64/cp311 (the runner
#      Python is 3.11). pyside6-android-deploy does NOT fetch them; we download
#      the open-source wheels from download.qt.io and pass them via
#      --wheel-pyside / --wheel-shiboken. (qtpip --android pulls the COMMERCIAL
#      wheels and needs a Qt commercial licence, so it's unusable in OSS CI.)
#   2. The NDK version must be the one the chosen Qt-for-Android expects.

on:
  # workflow_dispatch only runs from the default branch, so the primary way to
  # build this experimental target from a feature branch is to push a tag.
  # Use an `android-*` tag (distinct from release.yml's v3.*/v4.*), e.g.
  # `git tag android-0.1 && git push origin android-0.1`.
  push:
    tags:
      - "android-*"
  workflow_dispatch:
    inputs:
      pyside_version:
        description: "PySide6 version to build against (must have published Android wheels)."
        required: false
        default: "6.11.1"

permissions:
  contents: read

jobs:
  android-apk:
    runs-on: ubuntu-latest
    # Build both flavours in parallel so they can be compared side by side.
    # fail-fast: false keeps the debug leg producing its artifact even if the
    # (newer, less battle-tested) release leg fails. The build mode is fed
    # into pysidedeploy.spec's [buildozer] `mode` per leg; everything else is
    # identical. NOTE on .aab vs .apk: `buildozer android release` defaults to
    # an Android App Bundle (.aab) -- a Play-Store *publishing* format that is
    # NOT directly installable (Play repacks it into per-device APKs). For a
    # like-for-like, sideloadable comparison we force the release leg to emit
    # an .apk too (android.release_artifact=apk, injected into the generated
    # buildozer.spec) and sign it with a throwaway key below.
    strategy:
      fail-fast: false
      matrix:
        mode: [debug, release]
    env:
      PYSIDE_VERSION: ${{ inputs.pyside_version || '6.11.1' }}
      BUILD_MODE: ${{ matrix.mode }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: System build dependencies (autotools for p4a recipes)
        run: |
          # python-for-android builds native recipes (e.g. libffi) from source
          # with autoreconf. libffi's configure.ac uses the libtool macro
          # LT_SYS_SYMBOL_USCORE, so libtool MUST be installed or autoreconf
          # fails with "possibly undefined macro". Install the full autotools +
          # common native-build toolchain p4a expects.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool libltdl-dev pkg-config m4 \
            build-essential zlib1g-dev libffi-dev libssl-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK (version expected by Qt for Android)
        run: |
          # Qt 6.11 expects NDK r27 LTS (27.2.12479018). Bump together with
          # PYSIDE_VERSION: Qt 6.7/6.8 used r26 (26.1.10909125).
          sdkmanager --install "ndk;27.2.12479018" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install deploy tooling
        run: |
          python -m pip install --upgrade pip
          # Desktop PySide6 provides the pyside6-android-deploy CLI.
          pip install "PySide6==${PYSIDE_VERSION}"
          # pyside6-android-deploy needs extra helpers (jinja2, pkginfo, tqdm)
          # that ship as a requirements file alongside the tool, not as hard
          # PySide6 deps. Install from that exact file so it tracks the version.
          pip install -r "$(python -c 'import os, PySide6; print(os.path.join(os.path.dirname(PySide6.__file__), "scripts", "requirements-android.txt"))')"
          # Our pure-Python runtime deps (no lxml: l5rdal >= v1.4.2 is stdlib
          # xml only) so python-for-android needs no C-extension recipes.
          # certifi: bundled CA roots. The python-for-android CPython has no
          # system CA store, so stdlib ssl fails verification on device;
          # android_main.py points SSL_CERT_FILE at certifi.where(). Pure
          # Python, vendored into the APK below.
          pip install "asq>=2.0" "qtpy>=2.4" "certifi" \
            "git+https://github.com/OpenNingia/pypdf.git@fix_escape" \
            "git+https://github.com/OpenNingia/l5rcm-data-access.git@v1.4.2"

      - name: Download Android wheels (open-source, aarch64/cp311)
        run: |
          # The OSS Android wheels are published on download.qt.io (the qtpip
          # --android route needs a Qt COMMERCIAL licence). Filenames embed the
          # version twice and the cp311 tag (runner Python is 3.11).
          base="https://download.qt.io/official_releases/QtForPython"
          pyw="pyside6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl"
          shw="shiboken6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl"
          mkdir -p android_wheels
          curl -fSL --retry 3 -o "android_wheels/${pyw}" "${base}/pyside6/${pyw}"
          curl -fSL --retry 3 -o "android_wheels/${shw}" "${base}/shiboken6/${shw}"
          ls -la android_wheels
          echo "WHEEL_PYSIDE=$PWD/android_wheels/${pyw}" >> "$GITHUB_ENV"
          echo "WHEEL_SHIBOKEN=$PWD/android_wheels/${shw}" >> "$GITHUB_ENV"

      - name: Make buildozer's sdkmanager JDK17-compatible
        run: |
          # buildozer 1.5.0 hardcodes <sdk>/tools/bin/sdkmanager (the obsolete
          # 'tools' package; targets/android.py:sdkmanager_path) and even calls
          # `sdkmanager --list`. That launcher needs JAXB (javax.xml.bind),
          # removed from the JDK in 11+, so it crashes on the JDK 17 we need for
          # gradle. Replace it with a shim forwarding to the modern
          # cmdline-tools sdkmanager, which runs fine on JDK 17.
          SDK="$ANDROID_SDK_ROOT"
          CMDTOOLS_SM="$(ls "$SDK"/cmdline-tools/*/bin/sdkmanager 2>/dev/null | sort -V | tail -1)"
          echo "modern sdkmanager: $CMDTOOLS_SM"
          test -n "$CMDTOOLS_SM"
          mkdir -p "$SDK/tools/bin"
          printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "$CMDTOOLS_SM" > "$SDK/tools/bin/sdkmanager"
          chmod +x "$SDK/tools/bin/sdkmanager"
          # Sanity: must print a version, not the JAXB NoClassDefFoundError.
          "$SDK/tools/bin/sdkmanager" --version
          # Pre-accept all SDK licenses so buildozer's installs are non-interactive.
          yes | "$CMDTOOLS_SM" --sdk_root="$SDK" --licenses >/dev/null 2>&1 || true

      - name: Pin p4a to Python 3.11 in the deploy tool (generator-level)
        run: |
          # WHY patch the deploy tool itself and NOT buildozer.spec:
          # the previous two-phase approach (--init, patch buildozer.spec, build)
          # did NOT survive -- pyside6-android-deploy regenerates/cleans the
          # generated buildozer.spec on the real build run (-f without
          # --keep-deployment-files wipes it), so any edit between the two phases
          # is lost. The values must be BAKED INTO THE GENERATOR so whatever spec
          # it writes already contains them. The generator is
          # deploy_lib/android/buildozer.py:BuildozerConfig.__init__, which does
          # `self.set_value("app", "p4a.branch", "develop")`; we inject a
          # `p4a.commit` set_value right after it.
          #
          # WHY pin the commit: the official PySide6 Android wheels are cp311, so
          # shiboken6.abi3.so needs libpython3.11.so. p4a's `develop` branch
          # (hardcoded by the deploy tool) bumped the python3/hostpython3 recipes
          # to 3.14, so the build would ship libpython3.14.so and dlopen fails.
          # 6b66944 is the last p4a commit whose python3 recipe == 3.11.13 while
          # still carrying the qt bootstrap + NDK r27 support. buildozer honours
          # p4a.commit via `git reset --hard <commit>` after cloning the branch.
          #
          # Also force Core-first Qt lib load order: Qt's Android loader
          # System.loadLibrary's the modules in array order and libQt6Core's
          # JNI_OnLoad must run first to register the JavaVM, else the next
          # module's JNI_OnLoad SIGSEGVs on a null VM. We only REORDER the
          # auto-detected module list (Core first) -- we deliberately do NOT
          # inject extra modules. In particular Widgets must stay out: the
          # QML UI runs on a QGuiApplication (android_main.py) and never
          # imports QtWidgets, so it is not auto-detected; forcing it in made
          # the Java QtLoader preload QtWidgets.abi3.so from lib/arm64 (only
          # bundled under site-packages) and exit before Python even started.
          BZ="$(python -c 'import os, PySide6; print(os.path.join(os.path.dirname(PySide6.__file__), "scripts", "deploy_lib", "android", "buildozer.py"))')"
          echo "patching deploy tool: $BZ"
          test -f "$BZ"
          python - "$BZ" <<'PY'
          import os, re, sys
          P4A_COMMIT = "6b66944a2f51e0c848c7ac51e04a771324067ecc"  # last p4a on Python 3.11.13
          MODE = os.environ.get("BUILD_MODE", "debug")
          p = sys.argv[1]
          s = open(p, encoding="utf-8").read()
          # (1) inject p4a.commit right after the hardcoded p4a.branch set_value,
          #     reusing that line's indentation. Idempotent.
          #     ALSO force android.release_artifact=apk here: buildozer 1.5
          #     defaults the release artifact to an .aab (Play publishing
          #     format, not directly installable). We want a sideloadable
          #     .apk from the release leg so it compares like-for-like with
          #     the debug .apk. Inert for the debug leg (which uses
          #     android.debug_artifact, already apk). Baked into the
          #     generator for the same reason as the p4a pin: the build run
          #     regenerates buildozer.spec, wiping any direct edit.
          #
          #     AND, for the RELEASE leg only, bump android.api to 35: the
          #     release build runs `lintVitalRelease`, which fails fatally on
          #     ExpiredTargetSdkVersion unless targetSdk >= 33 (the debug
          #     build skips that lint, so it builds fine at the lower default
          #     -- that's why we gate this on MODE so the debug artifact stays
          #     byte-for-byte unchanged). API 35 matches the installed
          #     platforms;android-35 / build-tools;35.0.0.
          if "p4a.commit" not in s:
              pat = re.compile(
                  r'(?m)^([ \t]*)self\.set_value\(\s*["\']app["\']\s*,\s*["\']p4a\.branch["\']\s*,\s*["\']develop["\']\s*\).*$')

              def _inject(m):
                  ind = m.group(1)
                  out = [m.group(0),
                         ind + f'self.set_value("app", "p4a.commit", "{P4A_COMMIT}")',
                         ind + 'self.set_value("app", "android.release_artifact", "apk")']
                  if MODE == "release":
                      out.append(ind + 'self.set_value("app", "android.api", "35")')
                  return "\n".join(out)

              s, n = pat.subn(_inject, s)
              assert n == 1, f"expected exactly 1 p4a.branch set_value, found {n}"
          # (2) Core-first reorder of the auto-detected modules list the tool
          #     turns into --qt-libs, AND strip Widgets. The build machine has
          #     no ANDROID_ARGUMENT so api.is_android() is False during the
          #     deploy tool's dependency scan -> it imports QtWidgets (via the
          #     desktop QWidget base in l5rcmcore) and would add Widgets to
          #     --qt-libs. On device the app runs QtWidgets-free, so Widgets
          #     must not be loaded: the Java QtLoader preloads every --qt-libs
          #     entry's *.abi3.so from lib/arm64, but QtWidgets.abi3.so is only
          #     bundled under site-packages -> startup crash. Stripping it keeps
          #     libQt6Widgets.so out too, which is fine (never imported).
          #     Skip silently if the source shape differs.
          s2, n2 = re.subn(
              r'(?m)^([ \t]*)modules\s*=\s*",".join\(\s*pysidedeploy_config\.modules\s*\)\s*$',
              r'\1modules = ",".join(["Core"] + [m for m in '
              r'dict.fromkeys(pysidedeploy_config.modules) '
              r'if m not in ("Core", "Widgets")])',
              s)
          if n2:
              s = s2
              print("normalised modules list (Core-first, Widgets stripped)")
          else:
              print("WARNING: modules join line not found; relying on spec [qt] order")
          # (3) Append pyjnius to the buildozer requirements. The deploy tool
          #     sets requirements to "python3,shiboken6,PySide6"; the app needs
          #     pyjnius to reach the Android Activity (setRequestedOrientation
          #     for screen rotation -- android_main._enable_rotation). pyjnius
          #     is a Cython module, so it can't be vendored like the pure-Python
          #     deps; it must be built by p4a (which has a recipe), hence a
          #     requirements entry rather than a project_dir drop. Non-fatal:
          #     if the requirements set_value isn't found we warn and carry on
          #     (rotation simply stays unavailable) rather than break the build.
          s3, n3 = re.subn(
              r'(set_value\(\s*["\']app["\']\s*,\s*["\']requirements["\']\s*,\s*["\'])([^"\']*)(["\'])',
              lambda m: m.group(1) + (m.group(2) if "pyjnius" in m.group(2)
                                      else m.group(2) + ",pyjnius") + m.group(3),
              s)
          if n3:
              s = s3
              print("added pyjnius to requirements")
          else:
              print("WARNING: requirements set_value not found; pyjnius NOT added (rotation unavailable)")
          open(p, "w", encoding="utf-8").write(s)
          print(f"pinned p4a.commit={P4A_COMMIT}")
          PY
          grep -nE "p4a\.(branch|commit)|release_artifact|android\.api|requirements|modules = " "$BZ" | head -20

      - name: Vendor pure-Python deps into project_dir (+ trim qtpy)
        run: |
          # pyside6-android-deploy sets buildozer requirements to
          # python3,shiboken6,PySide6 only, so our pure-Python runtime deps
          # (qtpy, asq, l5rdal, pypdf) are NOT bundled -> the app dies with
          # ModuleNotFoundError: No module named 'qtpy'. They are all pure
          # Python, so we drop them into project_dir (=repo root) next to the
          # app code; p4a bundles the whole project_dir, so they import on
          # device.
          #
          # qtpy needs special care: pyside6-android-deploy finds the Qt modules
          # to bundle by AST-scanning EVERY .py in project_dir for
          # `from PySide6.QtX import ...` (see deploy_lib/dependency_util.py).
          # qtpy ships a shim per Qt module (`QtAxContainer.py` does
          # `from PySide6.QtAxContainer import *`, etc.), so vendoring qtpy whole
          # makes the tool think the app uses every Qt module and it dies with
          # "libQt6AxContainer ... not found inside the wheel". So we trim the
          # vendored qtpy to only the shims the app imports (QtCore/QtGui/QtQml),
          # drop uic.py (pulls QtUiTools), and delete QtGui's QtWidgets backport
          # line. After trimming, the only PySide6.Qt* references under
          # project_dir resolve to Core/Gui/OpenGL/Qml -- all in the wheel -- and
          # nothing pulls QtWidgets (which is why the app can stay QtWidgets-free,
          # see the related code changes + the Widgets strip above).
          # NB: "packaging" is qtpy's only runtime dependency (qtpy/__init__.py
          # imports packaging.version) -- it is pure Python and must be bundled
          # too, else: ModuleNotFoundError: No module named 'packaging'.
          python - <<'PY'
          import importlib.util, os, re, shutil
          for name in ("qtpy", "asq", "l5rdal", "pypdf", "packaging", "certifi"):
              spec = importlib.util.find_spec(name)
              if spec is None or not spec.origin:
                  raise SystemExit(f"::error::dependency {name} not importable")
              src = os.path.dirname(spec.origin)
              dst = os.path.join(os.getcwd(), name)
              if os.path.abspath(src) != os.path.abspath(dst):
                  shutil.rmtree(dst, ignore_errors=True)
                  shutil.copytree(src, dst)
              print(f"vendored {name} <- {src}")

          # --- trim the vendored qtpy ---
          q = os.path.join(os.getcwd(), "qtpy")
          keep = {"QtCore.py", "QtGui.py", "QtQml.py"}
          removed = []
          for fn in os.listdir(q):
              if re.match(r"Qt.*\.py$", fn) and fn not in keep:
                  os.remove(os.path.join(q, fn)); removed.append(fn)
          uic = os.path.join(q, "uic.py")
          if os.path.exists(uic):
              os.remove(uic); removed.append("uic.py")
          # drop QtGui's `from PySide6.QtWidgets import QFileSystemModel` backport
          qtgui = os.path.join(q, "QtGui.py")
          s = open(qtgui, encoding="utf-8").read()
          s2 = re.sub(r'(?m)^[ \t]*from PySide6\.QtWidgets import QFileSystemModel[ \t]*$\n?',
                      '', s)
          assert s2 != s, "QtGui QFileSystemModel backport line not found"
          open(qtgui, "w", encoding="utf-8").write(s2)
          print("trimmed qtpy; removed shims:", ", ".join(sorted(removed)))
          PY
          echo "--- remaining PySide6.Qt refs under project_dir ---"
          grep -rhoE "from PySide6\.Qt[A-Za-z0-9]+" qtpy l5r android_main.py main.py 2>/dev/null | sort -u

      - name: Build APK (pyside6-android-deploy)
        run: |
          # pyside6-android-deploy resolves project_dir / input_file / qml_files
          # RELATIVE TO THE SPEC FILE's directory, and writes buildozer.spec into
          # the cwd, so run from the project root with the spec copied there
          # (project_dir=., android_main.py, l5r/qmlui/qml). The generator was
          # patched above, so the buildozer.spec it writes already pins p4a to
          # Python 3.11 and orders the Qt libs Core-first -- single invocation,
          # nothing to patch in between.
          cp tools/deploy/android/pysidedeploy.spec ./pysidedeploy.spec
          # Per-leg build flavour: rewrite [buildozer] mode (debug|release).
          # The canonical spec stays at debug; only this run's copy is flipped.
          sed -i "s/^mode = .*/mode = ${BUILD_MODE}/" ./pysidedeploy.spec
          echo "building in '${BUILD_MODE}' mode:"; grep -n "^mode = " ./pysidedeploy.spec
          pyside6-android-deploy \
            -c pysidedeploy.spec \
            --wheel-pyside "$WHEEL_PYSIDE" \
            --wheel-shiboken "$WHEEL_SHIBOKEN" \
            --ndk-path "$ANDROID_NDK_ROOT" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --keep-deployment-files \
            -f -v || (echo "::error::APK build failed -- see log; check wheel/NDK versions (see android.yml header)"; exit 1)

      - name: Verify embedded Python is 3.11 (not 3.14)
        if: always()
        run: |
          # Definitive proof the p4a.commit pin landed: the cloned p4a must be
          # at the pinned commit and the build must ship libpython3.11.so (the
          # cp311 wheels' shiboken6.abi3.so needs it). If libpython3.14.so shows
          # up instead, the pin did NOT take effect (p4a develop = 3.14).
          echo "::group::cloned p4a HEAD"
          p4a_dir="$(find .buildozer -maxdepth 4 -type d -name python-for-android 2>/dev/null | head -1)"
          if [ -n "$p4a_dir" ]; then
            git -C "$p4a_dir" rev-parse HEAD || true
            grep -RnE "version = '3\.(11|14)" "$p4a_dir/pythonforandroid/recipes/python3/__init__.py" || true
          else
            echo "(python-for-android clone not found)"
          fi
          echo "::endgroup::"
          echo "::group::libpython shipped in build tree"
          found="$(find .buildozer -name 'libpython3*.so' 2>/dev/null | sort -u)"
          echo "${found:-（none found）}"
          if echo "$found" | grep -q 'libpython3.14'; then
            echo "::error::APK embeds libpython3.14 -- p4a.commit pin did NOT take effect"
          fi
          echo "::endgroup::"

      - name: Sign release APK (throwaway key — sideload/comparison only)
        if: success() && matrix.mode == 'release'
        run: |
          # `buildozer android release` emits an UNSIGNED apk
          # (*-release-unsigned.apk); Android won't install an unsigned apk,
          # so sign it here with an ephemeral keystore generated on the fly.
          # This is strictly for testing/size comparison -- a real Play
          # release would use a managed signing key, never this throwaway.
          set -e
          BT="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/*/ | sort -V | tail -1)"
          echo "build-tools: $BT"
          APK="$(find . -name '*-release-unsigned.apk' | head -1)"
          if [ -z "$APK" ]; then
            echo "::error::no *-release-unsigned.apk found -- did the release leg emit an .aab instead?"
            echo "artifacts present:"; find . \( -name '*.apk' -o -name '*.aab' \) -printf '%s\t%p\n'
            exit 1
          fi
          echo "unsigned release apk: $APK"
          keytool -genkeypair -dname "CN=L5RCM Test, O=L5RCM, C=IT" -alias test \
            -keystore test.keystore -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000
          # Emit the signed apk at the repo ROOT: buildozer leaves it under
          # .buildozer/... (a *hidden* dir), which actions/upload-artifact
          # does NOT descend into (include-hidden-files defaults to false), so
          # the upload glob would find nothing. A non-hidden root path is
          # picked up by `*.apk`.
          OUT="$GITHUB_WORKSPACE/L5RCM-release.apk"
          "${BT}zipalign" -f -p 4 "$APK" "$OUT.tmp"
          "${BT}apksigner" sign --ks test.keystore --ks-pass pass:android \
            --out "$OUT" "$OUT.tmp"
          rm -f "$OUT.tmp"
          # Drop every unsigned copy (buildozer may leave one in bin/ and one
          # in cwd) so the upload glob can't pick up an uninstallable apk.
          find . -name '*-release-unsigned.apk' -delete
          "${BT}apksigner" verify "$OUT"
          echo "signed release apk: $OUT"
          ls -la "$OUT"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v5
        with:
          # Per-leg name so the debug and release artifacts don't collide.
          name: l5rcm-android-${{ matrix.mode }}-apk
          path: |
            *.apk
            **/*.apk
          if-no-files-found: error
