name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install flake8
      - name: Hard-fail on syntax errors / undefined names
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Soft lint (warnings only)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: System dependencies for PyQt6 + lxml
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev \
            libegl1 libxcb-cursor0 libxkbcommon-x11-0 libdbus-1-3
      - name: Install package
        run: pip install .
      - name: Run tests
        run: python -m unittest discover -s l5r -v
